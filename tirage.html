<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tombola MTL connecte - Tirage</title>

    <link rel="stylesheet"
          href="css/app.css">

</head>

<body>

<div class="page-layout">

    <!-- BANNIÈRE -->

    <div class="left-panel">

        <img
            src="assets/banner.png"
            alt="MTL connecte"
            class="banner-image">

    </div>

    <!-- ZONE DROITE -->

    <div class="right-panel">

        <div class="tirage-card">

            <div id="wheelStage" class="wheel-stage">

                <div class="wheel-pointer"></div>

                <canvas
                    id="wheelCanvas"
                    class="wheel-canvas"
                    width="600"
                    height="600">
                </canvas>

                <div class="wheel-center">
                    MTL
                </div>

            </div>

            <div
                id="drawDisplay"
                class="draw-display waiting">



            </div>

            <div
                id="winnerInfo"
                class="winner-info">

            </div>

            <button
                id="drawBtn"
                class="submit-btn draw-btn">

                Lancer le tirage

            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="js/config.js?v=20260609-2"></script>
<script src="js/api.js?v=20260609-2"></script>
<script src="js/tirage.js?v=20260609-2"></script>
</body>

</html>
</html>
