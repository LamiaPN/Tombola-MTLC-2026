<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Participation - Tombola MTL connecte</title>

    <link rel="stylesheet" href="css/app.css">

</head>

<body>

<div class="form-page">

    <div class="form-card">

        <div class="form-header">

            <img
                src="assets/logo.png"
                alt="MTL connecte"
                class="form-logo"
            >

            <h1>Vos informations</h1>

            <p class="intro-text">
                Complétez le formulaire pour participer à la tombola.
            </p>

        </div>

         <div id="confirmation"></div>
        <form id="participantForm">

            <div class="consent-box">

                <label class="checkbox-label">

                    <input
                        type="checkbox"
                        id="consent"
                        required
                    >

                    J'accepte que mes informations soient utilisées dans le cadre de la tombola MTL connecte.

                </label>

            </div>

            <div class="row">

                <div class="field">

                    <label>Prénom *</label>

                    <input
                        type="text"
                        id="firstName"
                        placeholder="Ex. : Marie"
                        required
                    >

                </div>

                <div class="field">

                    <label>Nom *</label>

                    <input
                        type="text"
                        id="lastName"
                        placeholder="Ex. : Tremblay"
                        required
                    >

                </div>

            </div>

            <div class="row">

                <div class="field">

                    <label>Organisation *</label>

                    <input
                        type="text"
                        id="company"
                        placeholder="Ex. : CGI"
                        required
                    >

                </div>

                <div class="field">

                    <label>Courriel *</label>

                    <input
                        type="email"
                        id="email"
                        placeholder="nom@entreprise.ca"
                        required
                    >

                </div>

            </div>

            <h3>Taille de l'organisation *</h3>

            <div class="chips" id="sizeGroup">

                <button type="button" class="chip">
                    1 à 5 employés
                </button>

                <button type="button" class="chip">
                    6 à 19 employés
                </button>

                <button type="button" class="chip">
                    20 à 49 employés
                </button>

                <button type="button" class="chip">
                    50 à 99 employés
                </button>

                <button type="button" class="chip">
                    100 employés et plus
                </button>

            </div>

            <h3>Secteur d'activité *</h3>

            <div class="chips" id="sectorGroup">

                <button type="button" class="chip">
                    Affaires, services et gestion
                </button>

                <button type="button" class="chip">
                    Communication, culture et événementiel
                </button>

                <button type="button" class="chip">
                    Éducation et formation
                </button>

                <button type="button" class="chip">
                    Industries et infrastructures
                </button>

                <button type="button" class="chip">
                    Secteurs sociaux et publics
                </button>

                <button type="button" class="chip">
                    Technologies et innovation
                </button>

            </div>

            <input type="hidden" id="size">
            <input type="hidden" id="sector">

            <button
                type="submit"
                class="submit-btn"
            >
                Participer →
            </button>

        </form>



    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>

</body>

</html>
